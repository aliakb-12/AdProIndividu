name: Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Set up Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. Fly.io login
      - name: Fly.io login
        uses: superfly/flyctl-actions@1.2
        with:
          args: "auth token ${{ secrets.FLY_API_TOKEN }}"

      # 4. Build Docker image
      - name: Build Docker
        run: docker build -t adproindividu:latest .

      # 5. Deploy to Fly.io
      - name: Deploy
        run: fly deploy --app ${{ secrets.FLY_APP }} --remote-only
